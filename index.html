<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ukulele Practice App</title>

  <!-- ===== PWA / Add to Home Screen ===== -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ukulele" />
  <meta name="application-name" content="Ukulele" />

  <!-- App icons (used by iOS Safari "Add to Home Screen", Android, desktop browsers) -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="manifest" href="site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div><p class="eyebrow">Ukulele Practice</p>
        <h1><i class="fa-solid fa-guitar"></i>Ukulele Studio</h1>
      </div>

      <div class="header-actions">
        <button id="swapPanelsBtn" class="icon-btn secondary" type="button" aria-label="สลับตำแหน่ง Chord และ Lyrics" title="สลับ Chord ↔ Lyrics" aria-pressed="false">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
        </button>
        <button id="dancerToggleBtn" class="icon-btn secondary" type="button" aria-label="แสดง/ซ่อนตัวการ์ตูน" title="แสดง/ซ่อนตัวการ์ตูน" aria-pressed="true">
          <i class="fa-solid fa-person-rays" id="dancerIcon"></i>
        </button>
        <button id="themeToggleBtn" class="icon-btn secondary" type="button" aria-label="Toggle theme">
          <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <main class="main-grid">

      <!-- Left Panel: Player -->
      <section class="panel player-panel">
        <div class="section-title">
          <h2>เครื่องเล่นเพลง</h2>
          <span id="loadStatus" class="load-light load-light--loading" role="status" aria-live="polite" title="กำลังโหลดข้อมูล..." aria-label="กำลังโหลดข้อมูล..."></span>
        </div>

        <label class="field-label">เลือกแหล่งเสียง</label>
        <div id="audioModeToggle" class="audio-mode-toggle">
          <button class="chip" data-mode="song"  type="button">Song</button>
          <button class="chip" data-mode="vocal" type="button">Vocal</button>
        </div>

        <label class="field-label" for="songSelect">เลือกเพลง</label>
        <select id="songSelect" class="select-input">
          <option value="">— เลือกเพลง —</option>
        </select>

        <div class="now-playing">
          <div class="album-art">
            <i class="fa-solid fa-music"></i>
          </div>
          <div>
            <p class="muted">Now Playing</p>
            <h3 id="currentSongTitle">ยังไม่ได้เลือกเพลง</h3>
          </div>
        </div>

        <div class="controls">
          <button id="prevSongBtn" class="control-btn" type="button" aria-label="เพลงก่อนหน้า" title="เพลงก่อนหน้า">
            <i class="fa-solid fa-backward-step"></i>
          </button>
          <button id="seekBackBtn" class="control-btn" type="button" disabled aria-label="ถอยหลัง 5 วินาที" title="ถอยหลัง 5 วิ">
            <i class="fa-solid fa-backward"></i>
          </button>
          <button id="playPauseBtn" class="control-btn primary" type="button" disabled>
            <i class="fa-solid fa-play"></i>
          </button>
          <button id="stopBtn" class="control-btn" type="button" disabled>
            <i class="fa-solid fa-stop"></i>
          </button>
          <button id="seekFwdBtn" class="control-btn" type="button" disabled aria-label="ไปข้างหน้า 5 วินาที" title="ไปข้างหน้า 5 วิ">
            <i class="fa-solid fa-forward"></i>
          </button>
          <button id="nextSongBtn" class="control-btn" type="button" aria-label="เพลงถัดไป" title="เพลงถัดไป">
            <i class="fa-solid fa-forward-step"></i>
          </button>
        </div>

        <div class="timeline-wrap">
          <div class="time-row">
            <span id="currentTime">00:00</span>
            <span id="durationTime">00:00</span>
          </div>
          <div id="progressTrack" class="progress-track" role="slider" tabindex="0">
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>
        </div>

        <div class="speed-section">
          <label class="field-label">Speed Control</label>
          <div id="speedButtons" class="speed-buttons">
            <button class="chip" data-speed="0.5"  type="button">0.5x</button>
            <button class="chip" data-speed="0.75" type="button">0.75x</button>
            <button class="chip active" data-speed="1"  type="button">1.0x</button>
            <button class="chip" data-speed="1.25" type="button">1.25x</button>
            <button class="chip" data-speed="1.5"  type="button">1.5x</button>
          </div>
        </div>

        <div class="metronome-card">
          <div class="metronome-head">
            <div>
              <p class="muted">Metronome</p>
              <h3><span id="bpmValue">100</span> BPM</h3>
            </div>
            <button id="metroToggleBtn" class="icon-btn" type="button">
              <i class="fa-solid fa-play"></i>
              เปิด
            </button>
          </div>

          <input id="bpmSlider" class="range-input" type="range" min="30" max="200" value="100" />

          <div class="metro-visual-wrap">
            <div id="metroVisual" class="metro-visual"></div>
            <span id="metroStateText">Metronome ปิดอยู่</span>
          </div>
        </div>
      </section>

      <!-- Center Panel: Chord + Character -->
      <section class="panel chord-panel">
        <div class="section-title">
          <h2>คอร์ดอูคูเลเล่</h2>
          <span id="currentChordLabel" class="status-pill accent">-</span>
        </div>

        <div class="chord-stage">
          <!-- Chord badge -->
          <div id="chordDisplay" class="chord-display">
            <span class="empty-state">เลือกเพลงแล้วกด Play</span>
          </div>

          <!-- Dancing character (Lottie) -->
          <div id="danceCharWrap" class="dance-char-wrap">
            <div id="lottieIdle"    class="lottie-player"></div>
            <div id="lottiePlaying" class="lottie-player" hidden></div>
          </div>
        </div>
      </section>

      <!-- Right Panel: Lyrics -->
      <section class="panel lyrics-panel">
        <div class="section-title">
          <h2>เนื้อเพลง</h2>
          <button id="autoScrollToggle" class="status-pill toggle-pill is-on" type="button" aria-pressed="true" title="เปิด/ปิด Auto Scroll">
            <i class="fa-solid fa-arrows-up-down"></i>
            <span>Auto Scroll</span>
          </button>
        </div>
        <div id="lyricsContainer" class="lyrics-container">
          <p class="empty-state">ยังไม่มีเนื้อเพลง</p>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
