<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <!-- Background (iOS will round corners on home screen) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ukulele neck + headstock (tilted slightly) -->
  <g transform="translate(256 256) rotate(-14)">

    <!-- Headstock -->
    <rect x="-32" y="-238" width="64" height="58" rx="10" fill="#451a03"/>
    <!-- Tuning pegs -->
    <circle cx="-24" cy="-218" r="5" fill="#fde68a"/>
    <circle cx="-24" cy="-200" r="5" fill="#fde68a"/>
    <circle cx="24"  cy="-218" r="5" fill="#fde68a"/>
    <circle cx="24"  cy="-200" r="5" fill="#fde68a"/>

    <!-- Neck / fretboard -->
    <rect x="-22" y="-185" width="44" height="120" fill="#78350f"/>
    <!-- Frets -->
    <line x1="-22" y1="-150" x2="22" y2="-150" stroke="#fde68a" stroke-width="2"/>
    <line x1="-22" y1="-120" x2="22" y2="-120" stroke="#fde68a" stroke-width="2"/>
    <line x1="-22" y1="-90"  x2="22" y2="-90"  stroke="#fde68a" stroke-width="2"/>

    <!-- Body: upper bout -->
    <ellipse cx="0" cy="-20" rx="90" ry="95" fill="url(#body)"/>
    <!-- Body: lower bout -->
    <ellipse cx="0" cy="80"  rx="115" ry="125" fill="url(#body)"/>
    <!-- Waist filler -->
    <rect x="-78" y="-25" width="156" height="60" fill="url(#body)"/>

    <!-- Sound hole -->
    <circle cx="0" cy="75" r="34" fill="#1e293b"/>
    <circle cx="0" cy="75" r="26" fill="#0f172a"/>

    <!-- Bridge -->
    <rect x="-50" y="135" width="100" height="14" rx="3" fill="#78350f"/>

    <!-- Strings (4) -->
    <g stroke="#1e293b" stroke-width="2" opacity="0.85">
      <line x1="-12" y1="-180" x2="-12" y2="142"/>
      <line x1="-4"  y1="-180" x2="-4"  y2="142"/>
      <line x1="4"   y1="-180" x2="4"   y2="142"/>
      <line x1="12"  y1="-180" x2="12"  y2="142"/>
    </g>
  </g>

  <!-- Music notes accent -->
  <text x="60" y="120" font-size="64" font-family="Inter, sans-serif" font-weight="700" fill="white" opacity="0.85">♪</text>
  <text x="410" y="450" font-size="52" font-family="Inter, sans-serif" font-weight="700" fill="white" opacity="0.75">♫</text>
</svg>
